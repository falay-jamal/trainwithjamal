<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jamal Diaby – NASM Certified Personal Trainer. Online coaching for fat loss & muscle building.">
<title>Jamal Diaby | Personal Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d060;
    --gold-dark: #a87c28;
    --dark: #0d0d0d;
    --dark2: #141414;
    --dark3: #1a1a1a;
    --cream: #f5f0e8;
    --grey: #9a9a9a;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
min-height: 100vh;
background: var(–dark3);
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Montserrat’, sans-serif;
padding: 24px 16px;
overflow-x: hidden;
}

/* Subtle background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 50%);
pointer-events: none;
}

.card {
width: 100%;
max-width: 380px;
background: var(–dark);
border-radius: 20px;
overflow: hidden;
box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.12);
animation: riseUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes riseUp {
from { opacity: 0; transform: translateY(40px) scale(0.97); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── HEADER ── */
.header {
position: relative;
padding: 44px 36px 36px;
overflow: hidden;
}

/* gold diagonal top-right */
.header::before {
content: ‘’;
position: absolute;
top: -20px; right: -20px;
width: 160px; height: 160px;
background: linear-gradient(135deg, #c9a84c 0%, #f0d060 45%, #a87c28 100%);
clip-path: polygon(100% 0, 100% 100%, 0 0);
}

/* gold left bar */
.header::after {
content: ‘’;
position: absolute;
left: 0; top: 24px; bottom: 24px;
width: 3px;
background: linear-gradient(to bottom, var(–gold), var(–gold-light), var(–gold-dark));
border-radius: 0 2px 2px 0;
}

.name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 42px;
font-weight: 300;
color: #f5f0e8;
letter-spacing: 0.04em;
line-height: 1.05;
animation: fadeIn 0.8s 0.2s both;
}

.name span {
font-weight: 600;
font-style: italic;
color: var(–gold-light);
}

.divider {
width: 52px;
height: 1px;
background: linear-gradient(to right, var(–gold), transparent);
margin: 16px 0 14px;
animation: expandW 0.8s 0.35s both;
}

@keyframes expandW {
from { width: 0; opacity: 0; }
to   { width: 52px; opacity: 1; }
}

.title {
font-size: 9px;
font-weight: 500;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–grey);
animation: fadeIn 0.8s 0.4s both;
}

.cert {
font-family: ‘Cormorant Garamond’, serif;
font-size: 14px;
font-style: italic;
color: var(–gold);
margin-top: 5px;
letter-spacing: 0.03em;
animation: fadeIn 0.8s 0.5s both;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}

/* ── CONTACT LINKS ── */
.contacts {
padding: 8px 0 12px;
border-top: 1px solid rgba(201,168,76,0.1);
}

.contact-link {
display: flex;
align-items: center;
gap: 16px;
padding: 18px 36px;
text-decoration: none;
position: relative;
transition: background 0.25s ease;
animation: fadeIn 0.7s both;
}

.contact-link:nth-child(1) { animation-delay: 0.55s; }
.contact-link:nth-child(2) { animation-delay: 0.65s; }
.contact-link:nth-child(3) { animation-delay: 0.75s; }
.contact-link:nth-child(4) { animation-delay: 0.85s; }

.contact-link::after {
content: ‘’;
position: absolute;
bottom: 0; left: 36px; right: 36px;
height: 1px;
background: rgba(201,168,76,0.08);
}

.contact-link:last-child::after { display: none; }

.contact-link:hover, .contact-link:active {
background: rgba(201,168,76,0.05);
}

.contact-link:active .icon-wrap {
transform: scale(0.92);
}

.icon-wrap {
width: 40px; height: 40px;
border-radius: 10px;
background: rgba(201,168,76,0.08);
border: 1px solid rgba(201,168,76,0.15);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
transition: transform 0.15s ease, background 0.25s ease;
}

.contact-link:hover .icon-wrap {
background: rgba(201,168,76,0.15);
}

.icon-wrap svg {
width: 16px; height: 16px;
stroke: var(–gold);
}

.contact-text { flex: 1; }

.contact-label {
display: block;
font-size: 8px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–gold-dark);
font-weight: 500;
margin-bottom: 3px;
}

.contact-value {
font-family: ‘Cormorant Garamond’, serif;
font-size: 16px;
color: #e8e2d8;
letter-spacing: 0.02em;
}

.arrow {
opacity: 0.25;
flex-shrink: 0;
}

/* ── FOOTER ── */
.footer {
padding: 20px 36px 28px;
border-top: 1px solid rgba(201,168,76,0.1);
display: flex;
align-items: center;
justify-content: space-between;
}

.save-btn {
display: inline-flex;
align-items: center;
gap: 8px;
background: linear-gradient(135deg, var(–gold-dark), var(–gold), var(–gold-light));
color: var(–dark);
font-family: ‘Montserrat’, sans-serif;
font-size: 10px;
font-weight: 600;
letter-spacing: 0.15em;
text-transform: uppercase;
padding: 12px 22px;
border-radius: 8px;
border: none;
cursor: pointer;
text-decoration: none;
transition: opacity 0.2s, transform 0.15s;
animation: fadeIn 0.8s 1s both;
}

.save-btn:hover { opacity: 0.9; }
.save-btn:active { transform: scale(0.97); }

.save-btn svg {
width: 13px; height: 13px;
stroke: var(–dark);
stroke-width: 2.5;
}

.footer-name {
font-family: ‘Cormorant Garamond’, serif;
font-size: 11px;
font-style: italic;
color: rgba(201,168,76,0.35);
letter-spacing: 0.05em;
animation: fadeIn 0.8s 1.1s both;
}
</style>

</head>
